<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>СтройCRM</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    background:#0f1115; color:#e8eaed; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .login-box{
    background:#171a21; padding:32px 24px; border-radius:20px; max-width:380px; width:100%;
    border:1px solid #2a2f3a; box-shadow:0 20px 40px rgba(0,0,0,.5);
  }
  .login-logo{
    width:56px; height:56px; border-radius:18px; background:linear-gradient(135deg,#ff7a3d,#c94f1a);
    display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:800; color:#1a1200;
    margin-bottom:16px;
  }
  .login-title{font-size:24px; font-weight:800; margin:0 0 4px;}
  .login-sub{font-size:14px; color:#8b90a0; margin:0 0 28px;}
  .login-field{margin-bottom:14px;}
  .login-field label{display:block; font-size:12px; color:#8b90a0; margin-bottom:5px; font-weight:600;}
  .login-field input{
    width:100%; background:#0f1115; border:1.5px solid #2a2f3a; border-radius:12px;
    padding:14px 15px; color:#e8eaed; font-size:16px; outline:none;
  }
  .login-field input:focus{border-color:#ff7a3d;}
  .login-error{
    background:rgba(255,92,92,.12); border:1px solid rgba(255,92,92,.3); color:#ff5c5c;
    padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:14px; display:none;
  }
  .login-btn{
    width:100%; background:#ff7a3d; color:#1a1200; border:none; border-radius:12px;
    padding:15px; font-size:15px; font-weight:700; cursor:pointer; margin-top:6px;
  }
  .login-btn:disabled{opacity:.6;}
  .login-hint{text-align:center; font-size:12px; color:#8b90a0; margin-top:18px; line-height:1.6;}
  .spinner{display:inline-block; width:16px; height:16px; border:2px solid rgba(0,0,0,.2); border-top-color:#1a1200; border-radius:50%; animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">С</div>
  <h1 class="login-title">СтройCRM</h1>
  <p class="login-sub">Войдите по коду сотрудника</p>

  <div class="login-error" id="loginError"></div>

  <div class="login-field">
    <label>Код сотрудника</label>
    <input type="text" id="loginCode" placeholder="напр. RUK-0001" autocapitalize="characters">
  </div>
  <div class="login-field">
    <label>Пароль</label>
    <input type="password" id="loginPass" placeholder="Пароль">
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">Войти</button>

  <p class="login-hint">Код сотрудника и пароль выдаёт руководитель компании.<br>Первый вход руководителя: RUK-0001</p>
</div>

<script>
async function doLogin() {
    const login = document.getElementById('loginCode').value.trim().toUpperCase();
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    errEl.style.display = 'none';

    if (!login || !pass) {
        errEl.textContent = 'Введите код сотрудника и пароль';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Входим...';

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password: pass })
        });
        const data = await response.json();

        if (!data.success) {
            errEl.textContent = data.error || 'Неверный логин или пароль';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Войти';
            return;
        }

        alert('✅ Вход выполнен!');
        btn.textContent = 'Войти';
        btn.disabled = false;
    } catch (e) {
        errEl.textContent = 'Ошибка: ' + e.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Войти';
    }
}
</script>
</body>
</html>
